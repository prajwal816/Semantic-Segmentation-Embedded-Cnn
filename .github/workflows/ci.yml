name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-and-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopencv-dev cmake ninja-build build-essential \
            python3-pip python3-venv

      - name: Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install --no-cache-dir -r requirements.txt

      - name: Pytest
        run: python3 -m pytest tests/ -q

      - name: Export tiny ONNX for C++ integration
        run: |
          python3 << 'PY'
          import sys
          from pathlib import Path
          import torch

          sys.path.insert(0, str(Path.cwd()))
          from src.python.training.unet_model import UNet

          Path("models/onnx").mkdir(parents=True, exist_ok=True)
          m = UNet(in_channels=3, num_classes=5, base=16)
          m.eval()
          x = torch.randn(1, 3, 128, 128)
          out = "models/onnx/ci_unet.onnx"
          torch.onnx.export(
              m,
              x,
              out,
              input_names=["input"],
              output_names=["logits"],
              opset_version=12,
              do_constant_folding=True,
          )
          print("Wrote", out)
          PY

      - name: Configure & build C++
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j 2

      - name: Headless edge pipeline (integration)
        run: ./build/seg_edge_pipeline configs/pipeline_ci.json

      - name: ONNX validate (reference backend, no ORT required)
        run: |
          python3 src/python/export/validate_onnx.py \
            --config configs/smoke_train.yaml \
            --checkpoint models/checkpoints/unet_best.pt \
            --onnx models/onnx/ci_unet.onnx \
            --backend reference || true
        continue-on-error: true
