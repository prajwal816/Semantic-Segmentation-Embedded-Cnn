model:
  name: unet
  in_channels: 3
  num_classes: 5
  base_channels: 32

data:
  num_samples: 10000
  image_size: [256, 256]
  val_fraction: 0.1
  seed: 42

training:
  epochs: 8
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 2
  loss: combined  # ce | dice | combined
  ce_weight: 0.5
  dice_weight: 0.5
  checkpoint_dir: models/checkpoints
  log_interval: 50

augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.2
  brightness: 0.15
  contrast: 0.15

export:
  onnx_path: models/onnx/unet_scene_seg.onnx
  opset: 12
  input_size: [1, 3, 256, 256]
