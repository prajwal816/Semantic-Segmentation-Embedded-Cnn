name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-and-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopencv-dev cmake ninja-build build-essential \
            python3-pip python3-venv

      - name: Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install --no-cache-dir -r requirements.txt

      - name: Pytest
        run: python3 -m pytest tests/ -q

      - name: Prepare CI checkpoint + ONNX + reference parity
        run: python3 scripts/ci_prepare_models.py

      - name: Validate ONNX (reference backend)
        run: |
          python3 src/python/export/validate_onnx.py \
            --config configs/ci_export.yaml \
            --checkpoint models/checkpoints/ci_unet.pt \
            --onnx models/onnx/ci_unet.onnx \
            --backend reference

      - name: Configure & build C++
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j 2

      - name: Headless edge pipeline (integration)
        run: ./build/seg_edge_pipeline configs/pipeline_ci.json
